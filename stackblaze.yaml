databases:
  - name: docuseal-db
    databaseName: docuseal
    user: docuseal
services:
  - type: web
    name: docuseal
    runtime: docker
    plan: starter
    autoDeploy: false
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: docuseal-db
          property: connectionString
      - key: SECRET_KEY_BASE
        generateValue: true
